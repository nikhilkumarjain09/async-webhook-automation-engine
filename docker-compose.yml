version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    container_name: webhook-automation-backend
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - NODE_ENV=development
      - PORT=${PORT:-3000}
      - API_PREFIX=${API_PREFIX:-api}
      - MONGO_URI=mongodb://mongodb:27017/webhook-engine
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - WEBHOOK_RETRY_LIMIT=5
      - WEBHOOK_RETRY_DELAY_MS=5000
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run start:dev
    networks:
      - webhook-network
    depends_on:
      - mongodb
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3000/api}
    container_name: webhook-automation-frontend
    ports:
      - "8080:80"
    networks:
      - webhook-network
    depends_on:
      - backend

  mongodb:
    image: mongo:6.0
    container_name: webhook-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - webhook-network

  redis:
    image: redis:7-alpine
    container_name: webhook-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - webhook-network

networks:
  webhook-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
